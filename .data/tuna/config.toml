[hotkeys]
custom = []

    [hotkeys.app.activate]
    carbonKeyCode = 49
    carbonModifiers = 256

    [hotkeys.app.comboMode]
    carbonKeyCode = 111
    carbonModifiers = 0

[settings]
backspaceBehavior = 'deleteCharacters'
comboModeCheatsheetBehavior = 'always'
comboModeThemeStyle = 'breadcrumb'
screenPreference = 'primary'
showResultsImmediatelyOnActivation = true
switchToTextModeWhenNoResults = true
themeIdentifier = 'com.brnbw.tuna.themes.default'
typingTimeoutDuration = 3.0

[[smartLinks.entries]]
enabled = true
name = 'bing'
requiresInput = true
template = 'https://www.bing.com/search?q={{input}}'

[[smartLinks.entries]]
enabled = true
